meters:
- name: emails_sent
  description: Outbound transactional emails sent through the send endpoint or SMTP, billed per email.
  unit: emails
  aggregation: sum
  dimensions:
  - organization
  - domain
- name: emails_received
  description: Inbound emails received and processed, billed per email.
  unit: emails
  aggregation: sum
  dimensions:
  - organization
  - domain
principles:
- name: Visibility
  description: Track monthly send/receive volume per domain against the pricing tiers.
- name: Allocation
  description: Use per-domain API tokens to attribute email volume to workloads or teams.
- name: Optimization
  description: Consolidate low-volume sends and suppress bounced/spam recipients to avoid wasted sends; stay under tier thresholds where practical.
- name: Accountability
  description: Assign owners per domain/token and review monthly email spend against budget.
