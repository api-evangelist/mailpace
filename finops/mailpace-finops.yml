description: >-
  FinOps view of MailPace spend. MailPace bills a single usage-based charge
  computed monthly on the number of emails sent and received, with tiered
  per-email rates (a first-10,000 tier and a lower marginal tier above it).
  There are no per-feature charges - domains, webhooks, and SMTP are included.
  A small free allowance (up to 100 emails/month) exists on request.
notes: >-
  Exact per-email rates come from the interactive pricing calculator and are
  not reconciled here; verify against the pricing page during reconciliation.
