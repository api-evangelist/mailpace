aid: mailpace
url: https://raw.githubusercontent.com/api-evangelist/mailpace/refs/heads/main/apis.yml
name: MailPace
kind: company
description: MailPace is a fast, privacy-focused transactional email API for developers.
  It delivers application email - password resets, receipts, notifications - over a
  simple HTTPS REST API and SMTP, with DKIM-verified sending domains, Ed25519-signed
  webhooks, and EU-based hosting.
